services:
  - type: web
    name: portfolio-backend
    env: python
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PORTFOLIO_ORIGIN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: portfolio-db
    databaseName: portfolio_crm
    plan: free
